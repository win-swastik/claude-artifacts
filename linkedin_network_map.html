const regionColors = {
    'India': '#ff9800',
    'Europe': '#4fc3f7',
    'US': '#81c784',
    'SE Asia': '#ba68c8',
    'GCC': '#f06292',
    'East Asia': '#ffd54f',
    'North America': '#81c784',
    'APAC': '#4dd0e1',
    'Middle East': '#f06292',
    'Africa': '#ffab91',
};

const roleBadgeClass = r => {
    const safe = r.replace('/', '');
    return ['Founder','C-Suite','MD','Partner','DirVP','Head','Investor','Senior'].includes(safe) ? 'role-' + safe : 'role-default';
};

// Init map
const map = L.map('map', {
    center: [20, 40],
    zoom: 3,
    zoomControl: false,
    attributionControl: false,
});

L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
}).addTo(map);

// Sort cities descending
const sortedCities = Object.entries(D).sort((a,b) => b[1].total - a[1].total);

// Build city list
const listContainer = document.getElementById('cityListItems');
sortedCities.forEach(([city, d]) => {
    const item = document.createElement('div');
    item.className = 'city-list-item';
    item.innerHTML = `<span>${city} <span style="color:#666">(${d.region})</span></span><span class="city-count">${d.total}</span>`;
    item.onclick = () => {
        map.flyTo([d.lat, d.lng], 10, { duration: 1 });
        openSidebar(city);
    };
    listContainer.appendChild(item);
});

// Add markers
sortedCities.forEach(([city, d]) => {
    const color = regionColors[d.region] || '#4dd0e1';
    const radius = Math.max(8, Math.min(40, Math.sqrt(d.total) * 2.5));
    
    // Pulsing circle marker
    const marker = L.circleMarker([d.lat, d.lng], {
        radius: radius,
        fillColor: color,
        color: color,
        weight: 2,
        opacity: 0.8,
        fillOpacity: 0.35,
    }).addTo(map);

    // Inner dot
    L.circleMarker([d.lat, d.lng], {
        radius: 4,
        fillColor: color,
        color: '#fff',
        weight: 1,
        opacity: 1,
        fillOpacity: 1,
    }).addTo(map);

    // Label
    const label = L.divIcon({
        className: '',
        html: `<div style="white-space:nowrap;font-size:12px;font-weight:600;color:${color};text-shadow:0 0 6px rgba(0,0,0,0.8),0 0 12px rgba(0,0,0,0.6);pointer-events:none;transform:translateX(-50%);text-align:center">${city}<br><span style="font-size:11px;font-weight:400;color:#ccc">${d.total}</span></div>`,
        iconSize: [0, 0],
        iconAnchor: [0, -radius - 8],
    });
    L.marker([d.lat, d.lng], { icon: label, interactive: false }).addTo(map);

    // Tooltip on hover
    const topRoles = Object.entries(d.role_breakdown).sort((a,b) => b[1]-a[1]).slice(0,4).map(([r,c]) => `${r}: ${c}`).join(', ');
    const topCos = d.top_companies.slice(0,5).map(c => c.name).join(', ');
    marker.bindTooltip(`<div style="font-size:13px"><strong>${city}</strong> — ${d.total} connections<br><span style="color:#aaa">${topRoles}</span><br><span style="color:#4fc3f7;font-size:11px">${topCos}</span></div>`, {
        direction: 'top',
        offset: [0, -radius],
        className: '',
    });

    // Click opens sidebar
    marker.on('click', () => openSidebar(city));
});

function openSidebar(city) {
    const d = D[city];
    const sb = document.getElementById('sidebar');
    sb.classList.add('open');
    document.getElementById('sidebar-city').textContent = `${city} — ${d.total} connections`;
    document.getElementById('sidebar-sub').textContent = `Region: ${d.region}`;
    
    // Role chips
    const rolesDiv = document.getElementById('sidebar-roles');
    const roles = Object.entries(d.role_breakdown).sort((a,b) => b[1]-a[1]);
    rolesDiv.innerHTML = roles.map(([r,c]) => `<span class="role-chip ${roleBadgeClass(r)}">${r}: ${c}</span>`).join('');
    
    // Company groups
    const body = document.getElementById('sidebar-body');
    body.innerHTML = d.top_companies.map(co => `
        <div class="company-group">
            <div class="company-name">
                <span>${co.name}</span>
                <span class="count">${co.count}</span>
            </div>
            <div class="company-people">
                ${co.people.map(p => `
                    <div class="person">
                        <div>
                            <div class="person-name">${p.url ? `<a href="${p.url}" target="_blank">${p.name}</a>` : p.name}</div>
                            <div class="person-title">${p.position}</div>
                        </div>
                        <span class="role-badge ${roleBadgeClass(p.role)}">${p.role}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
}

// Close sidebar on map click
map.on('click', () => closeSidebar());
</script>
</body>
</html>
